<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzer - Create Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    body {
      background-color: #1a73e8;
      /* Vivid blue from wireframe */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .auth-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 30px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .auth-title {
      font-weight: 700;
      color: #212529;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2rem;
    }

    .form-control {
      padding: 12px 15px;
      border-radius: 6px;
      border: 1px solid #ced4da;
    }

    .form-control:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.25);
    }

    .form-label {
      font-weight: 500;
      color: #495057;
      margin-bottom: 8px;
    }

    .btn-auth {
      background-color: #1a73e8;
      color: white;
      font-weight: 600;
      padding: 12px;
      border-radius: 6px;
      border: none;
      width: 100%;
      font-size: 1.1rem;
      margin-top: 20px;
      transition: background-color 0.2s;
    }

    .btn-auth:hover {
      background-color: #1557b0;
      color: white;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.95rem;
      color: #495057;
    }

    .auth-footer a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="fade-in">

  <div class="auth-card position-relative">
    <a href="index.html" class="position-absolute top-0 start-0 m-3 text-secondary text-decoration-none small fw-bold">
      <i class="fa-solid fa-arrow-left"></i> Home
    </a>
    <h2 class="auth-title mt-3">Create Account</h2>

    <form id="signupForm">
      <div id="signupMsg" class="alert d-none"></div>
      <div class="mb-4">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="Enter email" required>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Create Password</label>
        <input type="password" class="form-control" id="password" placeholder="Password" required>
      </div>

      <div class="mb-3">
        <label for="confirm" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm" placeholder="Confirm password" required>
      </div>

      <button type="submit" class="btn-auth">Signup</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login Here</a>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const msg = document.getElementById('signupMsg');

      if (password !== confirm) {
        msg.className = 'alert alert-danger';
        msg.innerText = 'Passwords do not match.';
        return;
      }

      try {
        const response = await fetch('auth/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const result = await response.json();

        if (result.success) {
          msg.className = 'alert alert-success';
          msg.innerText = result.message + ' Redirecting...';
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          msg.className = 'alert alert-danger';
          msg.innerText = result.message;
        }
      } catch (err) {
        msg.className = 'alert alert-danger';
        msg.innerText = 'Network error. Please try again.';
      }
    });
  </script>
</body>

</html>
