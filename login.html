<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzer - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    body {
      background-color: #1a73e8; /* Vivid blue from wireframe */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .auth-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 30px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .auth-title {
      font-weight: 700;
      color: #212529;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2rem;
    }
    .form-control {
      padding: 12px 15px;
      border-radius: 6px;
      border: 1px solid #ced4da;
    }
    .form-control:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.25);
    }
    .form-label {
      font-weight: 500;
      color: #495057;
      margin-bottom: 8px;
    }
    .btn-auth {
      background-color: #1a73e8;
      color: white;
      font-weight: 600;
      padding: 12px;
      border-radius: 6px;
      border: none;
      width: 100%;
      font-size: 1.1rem;
      margin-top: 10px;
      transition: background-color 0.2s;
    }
    .btn-auth:hover {
      background-color: #1557b0;
      color: white;
    }
    .forgot-pass {
      color: #1a73e8;
      text-decoration: none;
      font-size: 0.9rem;
      display: block;
      text-align: right;
      margin-bottom: 20px;
    }
    .forgot-pass:hover {
      text-decoration: underline;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.95rem;
      color: #495057;
    }
    .auth-footer a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="fade-in">

  <div class="auth-card position-relative">
    <a href="index.html" class="position-absolute top-0 start-0 m-3 text-secondary text-decoration-none small fw-bold">
      <i class="fa-solid fa-arrow-left"></i> Home
    </a>
    <h2 class="auth-title mt-3">Login</h2>
    
    <form id="loginForm">
      <div id="loginMsg" class="alert d-none"></div>
      <div class="mb-4">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
      </div>
      
      <div class="mb-2">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
      </div>
      
      <a href="#" class="forgot-pass">Forgot password?</a>
      
      <button type="submit" class="btn-auth">Login</button>
    </form>
    
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Signup Now</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');

      try {
        const response = await fetch('auth/login.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, password})
        });
        const result = await response.json();
        
        if (result.success) {
          msg.className = 'alert alert-success';
          msg.innerText = result.message + ' Redirecting...';
          setTimeout(() => window.location.href = 'dashboard.php', 1000);
        } else {
          msg.className = 'alert alert-danger';
          msg.innerText = result.message;
        }
      } catch (err) {
        msg.className = 'alert alert-danger';
        msg.innerText = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
